services:
  - type: web
    name: python-ai-assistant
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: DISABLE_AUTOMATION
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

